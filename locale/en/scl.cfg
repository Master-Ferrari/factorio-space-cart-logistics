[entity-description]
gofarovich-scl-rail=Tile-sized rail node. Connections auto-derive from neighbor rails.
gofarovich-scl-cart=Externally-routed cart. Flows along connected rails.
gofarovich-scl-dock=Grabs carts off a straight rail on the tile it faces and holds them for loading/unloading. Release with /scl-dock-release (conditions come later).

